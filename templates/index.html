<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Llama ile Akıllı Turizm Rehberi</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fa-solid fa-compass"></i>
            <span>Gezi Geçmişi</span>
        </div>
        <button class="new-chat-btn" onclick="clearChat()">
            <i class="fa-solid fa-plus"></i> Yeni Rota Başlat
        </button>
        <div class="history-list" id="historyList">
            <div class="history-item active">
                <i class="fa-regular fa-message"></i> Mevcut Sohbet
            </div>
        </div>
    </div>

    <div class="chat-container">
        <div class="chat-header">
            <div class="avatar">
                <i class="fa-solid fa-map-location-dot" style="color: #111119;"></i>
            </div>
            <div class="chat-title">
                <h2>Akıllı Turizm Rehberi</h2>
                <p>Llama 3.1 & Groq ile Çevrimiçi</p>
            </div>
        </div>

        <div class="messages-area" id="messagesArea">
            <div class="message ai">
                <div class="msg-bubble">
                    Merhaba! Ben senin yapay zeka destekli akıllı seyahat rehberinim. Türkiye'de nereyi keşfetmek istersin? Harika rotalar, gizli kalmış lezzetler ve tarihi mekanlar için bana istediğini sorabilirsin! 🗺️✨
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Keşfetmek istediğin şehri veya mekanı yaz..." onkeypress="handleKeyPress(event)">
            </div>
            <button class="send-btn" onclick="sendMessage()">
                <i class="fa-solid fa-paper-plane"></i>
            </button>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
